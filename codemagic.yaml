workflows:
  android-workflow:
    name: Momento Android Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      java: 17
    scripts:
      - name: Create .env file for secrets
        script: |
          echo "SUPABASE_URL=$SUPABASE_URL" > "$CM_BUILD_DIR/.env"
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> "$CM_BUILD_DIR/.env"
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"
      - name: Generate Gradle Wrapper
        script: |
          gradle wrapper --gradle-version 9.3.1
      - name: Generate debug keystore
        script: |
          keytool -genkey -v -keystore "$CM_BUILD_DIR/debug.keystore" -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "cn=Unknown, ou=Unknown, o=Unknown, c=Unknown"
      - name: Build Android App (Release)
        script: |
          ./gradlew assembleRelease
    artifacts:
      - app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - rohankaradigudd@gmail.com
